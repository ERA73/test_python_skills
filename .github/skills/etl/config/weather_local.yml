pipeline:
  name: weather_openmeteo_to_csv

extract:
  type: openmeteo
  latitude: 40.4168     # Madrid
  longitude: -3.7038
  hours: 6              # dataset pequeño: próximas/últimas 6 horas (según API/params)
  timeout_seconds: 10

transform:
  type: c_to_f

load:
  type: csv
  path: data/weather_out.csv